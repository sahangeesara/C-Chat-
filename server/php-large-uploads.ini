; PHP Configuration for 1GB File Upload Support
; This file can be used with php -c php.ini for local development

; Maximum allowed size of uploaded files
upload_max_filesize = 1024M

; Maximum size of POST data that PHP will accept
post_max_size = 1024M

; Maximum amount of memory a script may consume
memory_limit = 512M

; Maximum execution time of each script, in seconds
max_execution_time = 300

; Maximum time in seconds a script is allowed to parse input data
max_input_time = 300

; Set default timezone
date.timezone = UTC

